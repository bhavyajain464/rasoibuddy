name: Deploy backend to Cloud Run (production)

# Production only: merges/pushes to main. Staging uses deploy-backend-staging.yml on develop.
on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: kitchmate-495620
  REGION: asia-south1
  SERVICE: kitchenai-backend
  IMAGE: gcr.io/kitchmate-495620/kitchenai-backend

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/208103249970/locations/global/workloadIdentityPools/github/providers/github-provider
          service_account: github-deployer@kitchmate-495620.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker auth for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build container image
        working-directory: backend
        run: |
          IMAGE_SHA="${IMAGE}:${GITHUB_SHA}"
          echo "IMAGE_SHA=${IMAGE_SHA}" >> "$GITHUB_ENV"
          docker build -t "${IMAGE}:latest" -t "${IMAGE_SHA}" .

      - name: Push image
        run: |
          docker push "${IMAGE}:latest"
          docker push "${IMAGE_SHA}"

      - name: Deploy to Cloud Run
        env:
          RUN_SECRETS: >-
            /secrets/kafka-ca.pem=kafka-ca-pem:latest,
            DATABASE_URL=database-url:latest,
            GEMINI_API_KEY=gemini-api-key:latest,
            GROQ_API_KEY=groq-api-key:latest,
            SESSION_TOKEN_SECRET=session-token-secret:latest,
            REDIS_URL=redis-url:latest,
            KAFKA_PASSWORD=kafka-sasl-password:latest,
            RAZORPAY_KEY_ID_PRODUCTION=razorpay-key-id-production:latest,
            RAZORPAY_KEY_SECRET_PRODUCTION=razorpay-key-secret-production:latest,
            RAZORPAY_WEBHOOK_SECRET_PRODUCTION=razorpay-webhook-secret-production:latest,
            SMTP_PASS=smtp-pass:latest
          RUN_ENV_VARS: >-
            ENVIRONMENT=production,
            GEMINI_MODEL=gemini-2.5-flash-lite,
            LLM_PROVIDER=groq,
            GROQ_MODEL=llama-3.3-70b-versatile,
            GROQ_NLU_MODEL=llama-3.3-70b-versatile,
            GROQ_VISION_MODEL=llama-3.3-70b-versatile,
            RAZORPAY_ENV=production,
            SMTP_HOST=smtp.gmail.com,
            SMTP_PORT=587,
            SMTP_USER=kitchmateai@gmail.com,
            SMTP_FROM=Kitchmate <kitchmateai@gmail.com>,
            WHATSAPP_TEST_MODE=true,
            GOOGLE_WEB_CLIENT_ID=208103249970-qg4bv6ilknfe52eqks8u662hp3toneua.apps.googleusercontent.com,
            GOOGLE_IOS_CLIENT_ID=208103249970-5j9v2282v0f9r0d8859shqmnurpc93lp.apps.googleusercontent.com,
            GOOGLE_ANDROID_CLIENT_ID=208103249970-ssbd98i8gqndd1o10vbaa6e5nfhkfcft.apps.googleusercontent.com,
            KAFKA_ENABLED=true,
            KAFKA_BROKERS=kafka-2ee49b67-bhavyajain464-358c.d.aivencloud.com:24210,
            KAFKA_TOPIC_SHELFLIFE=shelf-life-estimate,
            KAFKA_CA_FILE=/secrets/kafka-ca.pem,
            KAFKA_SASL_ENABLED=true,
            KAFKA_SASL_MECHANISM=PLAIN,
            KAFKA_USERNAME=avnadmin,
            KAFKA_TLS_ENABLED=true,
            PREMIUM_GRANT_TIER=elite,
            PREMIUM_GRANT_EMAILS=akhilshukla2000@gmail.com;avishabagdiya@gmail.com;bhavyajain464@gmail.com;houseofshringara25@gmail.com;infinitystones464@gmail.com;kitchmateai@gmail.com;prabalcs@gmail.com;prabaltikeriha@gmail.com;ritikjain3585@gmail.com;sankalpchauhan.me@gmail.com;singhjishan2@gmail.com;yash.singhania.smart@gmail.com;yashh.singhaniaa@gmail.com
        run: |
          gcloud run deploy "${SERVICE}" \
            --image "${IMAGE_SHA}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --platform managed \
            --port 8080 \
            --memory 256Mi \
            --cpu 1 \
            --allow-unauthenticated \
            --set-secrets "${RUN_SECRETS}" \
            --set-env-vars "${RUN_ENV_VARS}" \
            --quiet

      - name: Show service URL
        run: |
          gcloud run services describe "${SERVICE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}" \
            --format='value(status.url)'
